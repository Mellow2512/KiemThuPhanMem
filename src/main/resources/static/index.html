<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSMS - Quản Lý Nhân Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center text-primary mb-4">Hệ Thống Quản Lý Lịch Làm Việc (CSMS)</h2>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Thêm Nhân Viên Mới</h5>
                </div>
                <div class="card-body">
                    <form id="userForm">
                        <div class="mb-2">
                            <label class="form-label">Mã NV (VD: NV001):</label>
                            <input type="text" class="form-control" id="id" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Họ và Tên:</label>
                            <input type="text" class="form-control" id="fullName" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Email:</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Mật khẩu:</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Vai trò:</label>
                            <select class="form-select" id="role">
                                <option value="ROLE_STAFF">Nhân viên</option>
                                <option value="ROLE_MANAGER">Quản lý</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100 mt-3">Thêm mới</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Danh Sách Nhân Sự</h5>
                </div>
                <div class="card-body">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                        <tr>
                            <th>Mã NV</th>
                            <th>Họ Tên</th>
                            <th>Email</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                        </tr>
                        </thead>
                        <tbody id="userTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api/users';


    function loadUsers() {
        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                const tableBody = document.getElementById('userTableBody');
                tableBody.innerHTML = ''; // Xóa dữ liệu cũ

                data.forEach(user => {
                    const row = `<tr>
                        <td>${user.id}</td>
                        <td>${user.fullName}</td>
                        <td>${user.email}</td>
                        <td><span class="badge ${user.role === 'ROLE_MANAGER' ? 'bg-danger' : 'bg-info'}">${user.role}</span></td>
                        <td><span class="badge bg-success">ACTIVE</span></td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            })
            .catch(error => console.error('Lỗi khi tải dữ liệu:', error));
    }


    document.getElementById('userForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Chặn việc tải lại trang


        const newUser = {
            id: document.getElementById('id').value,
            fullName: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            role: document.getElementById('role').value,
            status: "ACTIVE" // Mặc định
        };


        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newUser)
        })
        .then(response => {
            if (!response.ok) throw new Error('Email bị trùng hoặc có lỗi xảy ra!');
            return response.json();
        })
        .then(data => {
            alert('Thêm nhân viên thành công!');
            document.getElementById('userForm').reset(); // Xóa trắng form
            loadUsers(); // Tải lại bảng ngay lập tức
        })
        .catch(error => alert(error.message));
    });


    window.onload = loadUsers;
</script>

</body>
</html>
