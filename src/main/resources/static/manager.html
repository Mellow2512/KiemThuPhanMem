<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSMS - Quản Lý</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        // Kiểm tra xem đã đăng nhập chưa và có phải Quản lý không
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'ROLE_MANAGER') {
            alert('Bạn không có quyền truy cập trang này! Vui lòng đăng nhập bằng tài khoản Quản lý.');
            window.location.href = '/login.html'; // Đuổi về trang đăng nhập
        }
    </script>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Bảng Điều Khiển Quản Lý CSMS</a>
        <div class="d-flex align-items-center">
            <span class="text-light me-3 fw-bold" id="managerName"></span>
            <button class="btn btn-danger btn-sm" onclick="logout()">Đăng xuất</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Thêm Nhân Viên Mới</h5>
                </div>
                <div class="card-body">
                    <form id="userForm">
                        <div class="mb-2">
                            <label class="form-label">Mã NV (VD: NV001):</label>
                            <input type="text" class="form-control" id="id" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Họ và Tên:</label>
                            <input type="text" class="form-control" id="fullName" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Email:</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Mật khẩu:</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Vai trò:</label>
                            <select class="form-select" id="role">
                                <option value="ROLE_STAFF">Nhân viên</option>
                                <option value="ROLE_MANAGER">Quản lý</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100 mt-3">Thêm mới tài khoản</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-secondary text-white">
                    <h5 class="mb-0">Danh Sách Nhân Sự</h5>
                </div>
                <div class="card-body p-0">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>Mã NV</th>
                            <th>Họ Tên</th>
                            <th>Email</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                        </tr>
                        </thead>
                        <tbody id="userTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Hiển thị tên người đang đăng nhập trên góc phải
    document.getElementById('managerName').innerText = "Xin chào: " + currentUser.fullName;

    // 2. Hàm đăng xuất
    function logout() {
        localStorage.removeItem('currentUser'); // Xóa phiên đăng nhập
        window.location.href = '/login.html'; // Trở về trang đăng nhập
    }

    const API_URL = 'http://localhost:8080/api/users';

    // 3. Hàm tải danh sách nhân viên từ Backend
    function loadUsers() {
        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                const tableBody = document.getElementById('userTableBody');
                tableBody.innerHTML = '';

                data.forEach(user => {
                    const row = `<tr>
                        <td>${user.id}</td>
                        <td>${user.fullName}</td>
                        <td>${user.email}</td>
                        <td><span class="badge ${user.role === 'ROLE_MANAGER' ? 'bg-danger' : 'bg-info'}">${user.role === 'ROLE_MANAGER' ? 'Quản lý' : 'Nhân viên'}</span></td>
                        <td><span class="badge bg-success">Đang hoạt động</span></td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            })
            .catch(error => console.error('Lỗi khi tải dữ liệu:', error));
    }

    // 4. Hàm thêm nhân viên mới
    document.getElementById('userForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const newUser = {
            id: document.getElementById('id').value,
            fullName: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            role: document.getElementById('role').value,
            status: "ACTIVE"
        };

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newUser)
        })
        .then(async response => {
            if (!response.ok) {
                const errorMsg = await response.text();
                throw new Error(errorMsg || 'Lỗi khi thêm nhân viên!');
            }
            return response.json();
        })
        .then(data => {
            alert('Thêm nhân viên thành công!');
            document.getElementById('userForm').reset();
            loadUsers();
        })
        .catch(error => alert("❌ Lỗi: " + error.message));
    });

    // Chạy hàm tải danh sách ngay khi mở trang web
    window.onload = loadUsers;
</script>

</body>
</html>
