<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSMS - Đăng Nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-secondary d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h4>Hệ Thống Quản Lý Lịch Làm Việc</h4>
                </div>
                <div class="card-body p-4">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email:</label>
                            <input type="email" id="email" class="form-control" placeholder="Nhập email..." required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Mật khẩu:</label>
                            <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu..." required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">ĐĂNG NHẬP</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        fetch('http://localhost:8080/api/users/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
        })
        .then(async response => {
            if (!response.ok) throw new Error(await response.text() || 'Sai thông tin đăng nhập!');
            return response.json();
        })
        .then(user => {
            // Lưu thông tin người dùng vào LocalStorage
            localStorage.setItem('currentUser', JSON.stringify(user));

            // PHÂN QUYỀN ĐIỀU HƯỚNG
            if (user.role === 'ROLE_MANAGER') {
                window.location.href = '/manager.html';
            } else {
                window.location.href = '/staff.html';
            }
        })
        .catch(error => alert(error.message));
    });
</script>
</body>
</html>
